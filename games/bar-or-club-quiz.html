  <main class="container quiz-wrap" style="padding:2rem 1rem;">
    <p class="eyebrow">Nightlife Games</p>
    <h1>Bar or Club Quiz: Which NYC Night Wins for You?</h1>
    <p class="muted">Answer 7 quick questions. We’ll score your best lane: <strong>Bar Route</strong>, <strong>Hybrid Route</strong>, or <strong>Club Route</strong>.</p>

    <div id="quiz"></div>

    <div class="quiz-actions">
      <button id="calcBtn" class="btn btn-primary">Get My Result</button>
      <button id="resetBtn" class="btn btn-secondary">Reset Quiz</button>
    </div>

    <section id="result" class="quiz-card result" hidden aria-live="polite"></section>
  </main>

  <script src="../js/main.js"></script>
  <script>
    const questions = [
      {
        id: 'energy',
        text: '1) What energy do you want tonight?',
        options: [
          {label:'Chill + conversation', score:{bar:3,hybrid:1,club:0}},
          {label:'Social but controlled', score:{bar:1,hybrid:3,club:1}},
          {label:'High-energy + dance-focused', score:{bar:0,hybrid:1,club:3}},
        ]
      },
      {
        id: 'budget',
        text: '2) Your per-person budget lane?',
        options: [
          {label:'Lean ($60–$120)', score:{bar:3,hybrid:1,club:0}},
          {label:'Balanced ($140–$280)', score:{bar:1,hybrid:3,club:2}},
          {label:'Premium ($350+)', score:{bar:0,hybrid:1,club:3}},
        ]
      },
      {
        id: 'lineTolerance',
        text: '3) How much line/door friction can your group handle?',
        options: [
          {label:'Low tolerance (keep it moving)', score:{bar:3,hybrid:2,club:0}},
          {label:'Some tolerance', score:{bar:1,hybrid:3,club:2}},
          {label:'High tolerance for big payoff', score:{bar:0,hybrid:1,club:3}},
        ]
      },
      {
        id: 'groupSize',
        text: '4) Group size tonight?',
        options: [
          {label:'2–3 people', score:{bar:2,hybrid:2,club:1}},
          {label:'4–6 people', score:{bar:1,hybrid:3,club:2}},
          {label:'7+ people', score:{bar:2,hybrid:2,club:0}},
        ]
      },
      {
        id: 'music',
        text: '5) Music priority?',
        options: [
          {label:'Background vibe only', score:{bar:3,hybrid:1,club:0}},
          {label:'Good music, not the full mission', score:{bar:1,hybrid:3,club:1}},
          {label:'Music is the mission', score:{bar:0,hybrid:1,club:3}},
        ]
      },
      {
        id: 'movement',
        text: '6) Route style?',
        options: [
          {label:'Walkable + simple pivots', score:{bar:3,hybrid:2,club:0}},
          {label:'One planned anchor + backup', score:{bar:1,hybrid:3,club:2}},
          {label:'Anchor venue above all', score:{bar:0,hybrid:1,club:3}},
        ]
      },
      {
        id: 'closeTime',
        text: '7) Desired close-out time?',
        options: [
          {label:'Done by 1:00 AM', score:{bar:3,hybrid:1,club:0}},
          {label:'1:00–2:30 AM', score:{bar:1,hybrid:3,club:2}},
          {label:'2:30 AM+ / all-in', score:{bar:0,hybrid:1,club:3}},
        ]
      }
    ];

    const state = {};
    const quizEl = document.getElementById('quiz');
    const resultEl = document.getElementById('result');

    function renderQuiz(){
      quizEl.innerHTML = '';
      questions.forEach((q) => {
        const card = document.createElement('section');
        card.className = 'quiz-card';
        card.innerHTML = `<h2 class="quiz-q">${q.text}</h2>`;

        const grid = document.createElement('div');
        grid.className = 'quiz-grid';

        q.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'opt-btn';
          btn.type = 'button';
          btn.textContent = opt.label;
          btn.setAttribute('aria-pressed', state[q.id] === idx ? 'true' : 'false');
          if (state[q.id] === idx) btn.classList.add('active');
          btn.addEventListener('click', () => {
            state[q.id] = idx;
            renderQuiz();
          });
          grid.appendChild(btn);
        });

        card.appendChild(grid);
        quizEl.appendChild(card);
      });
    }

    function calculate(){
      for (const q of questions) {
        if (typeof state[q.id] !== 'number') {
          resultEl.hidden = false;
          resultEl.innerHTML = `<h2>Finish all questions</h2><p>Please answer every question before scoring your lane.</p>`;
          return;
        }
      }

      const totals = {bar:0, hybrid:0, club:0};
      questions.forEach(q => {
        const choice = q.options[state[q.id]];
        totals.bar += choice.score.bar;
        totals.hybrid += choice.score.hybrid;
        totals.club += choice.score.club;
      });

      const max = Math.max(totals.bar, totals.hybrid, totals.club);
      let lane = 'bar';
      if (totals.hybrid === max) lane = 'hybrid';
      if (totals.club === max) lane = 'club';

      const content = {
        bar: {
          title: '✅ Your Best Fit: Bar Route Lane',
          badge: 'Low friction / high flexibility',
          cls: 'fill-bar',
          why: 'You optimize for momentum, easier pivots, and lower line risk.',
          plan: [
            'Pick one high-density neighborhood (LES, West Village, Williamsburg).',
            'Lock 1 opener + 1 backup within 10–15 minutes.',
            'Use a simple 3-stop structure and close near reliable transit.'
          ],
          links: [
            ['/tools/nyc-night-planner.html','Build your bar route'],
            ['/rankings/best-bars-in-nyc.html','Use the bar rankings'],
            ['/tools/nyc-trip-cost-calculator.html','Run budget math']
          ]
        },
        hybrid: {
          title: '🔥 Your Best Fit: Hybrid Route Lane',
          badge: 'Balanced control + upside',
          cls: 'fill-hybrid',
          why: 'You want one stronger anchor while keeping fallback optionality.',
          plan: [
            'Start with a quality opener, then hit one anchor venue.',
            'Pre-select one fallback before peak congestion windows.',
            'Set a hard pivot cutoff so the group doesn’t stall.'
          ],
          links: [
            ['/tools/venue-compare-nyc.html','Compare anchor options'],
            ['/tools/nyc-night-planner.html','Build a hybrid plan'],
            ['/tonight/','Check tonight signals']
          ]
        },
        club: {
          title: '🎯 Your Best Fit: Club Route Lane',
          badge: 'High energy / high commitment',
          cls: 'fill-club',
          why: 'You prioritize music/production payoff and accept higher door friction.',
          plan: [
            'Commit to one anchor club strategy early.',
            'Optimize arrival timing instead of defaulting to peak-hour chaos.',
            'Keep one nearby fallback to avoid dead-end line loss.'
          ],
          links: [
            ['/rankings/best-clubs-in-nyc.html','Use club ranking framework'],
            ['/guides/vip-club-access-nyc.html','Apply door strategy'],
            ['/tools/cover-charge-calculator-nyc.html','Estimate total spend']
          ]
        }
      };

      const laneScorePct = Math.round((max / 21) * 100);
      const pick = content[lane];

      resultEl.hidden = false;
      resultEl.innerHTML = `
        <span class="result-badge">${pick.badge}</span>
        <h2>${pick.title}</h2>
        <p>${pick.why}</p>
        <div class="lane-bar"><div class="lane-fill ${pick.cls}" style="width:${laneScorePct}%"></div></div>
        <p class="muted">Confidence: ${laneScorePct}% alignment</p>
        <h3>Tonight’s execution plan</h3>
        <ul>${pick.plan.map(x=>`<li>${x}</li>`).join('')}</ul>
        <h3>Next best actions</h3>
        <ul>${pick.links.map(([u,t])=>`<li><a href="${u}">${t}</a></li>`).join('')}</ul>
      `;
      resultEl.scrollIntoView({behavior:'smooth', block:'start'});
    }

    function resetQuiz(){
      Object.keys(state).forEach(k => delete state[k]);
      resultEl.hidden = true;
      resultEl.innerHTML = '';
      renderQuiz();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    document.getElementById('calcBtn').addEventListener('click', calculate);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
    renderQuiz();
  </script>
