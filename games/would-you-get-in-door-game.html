  <main class="container wrap" style="padding:2rem 1rem;">
    <p class="eyebrow">Nightlife Games</p>
    <h1>Would You Get In? NYC Door Strategy Game</h1>
    <p class="muted">Set your scenario and we’ll simulate your door odds with tactical fixes.</p>

    <section class="card">
      <h2>Scenario Builder</h2>
      <div class="grid">
        <div>
          <label for="arrival">Arrival Window</label>
          <select id="arrival">
            <option value="early">Early (10:00–11:00 PM)</option>
            <option value="peak">Peak (11:30 PM–12:30 AM)</option>
            <option value="late">Late (1:00 AM+)</option>
          </select>
        </div>
        <div>
          <label for="group">Group Size</label>
          <select id="group">
            <option value="small">2–3 people</option>
            <option value="mid">4–6 people</option>
            <option value="large">7+ people</option>
          </select>
        </div>
        <div>
          <label for="dress">Dress Execution</label>
          <select id="dress">
            <option value="strong">Strong + consistent</option>
            <option value="mixed">Mixed / uncertain</option>
            <option value="weak">Weak fit for venue</option>
          </select>
        </div>
        <div>
          <label for="energy">Group Composure</label>
          <select id="energy">
            <option value="calm">Calm + coordinated</option>
            <option value="average">Average</option>
            <option value="chaotic">Chaotic / loud</option>
          </select>
        </div>
        <div>
          <label for="booking">Table/Host Situation</label>
          <select id="booking">
            <option value="host">Host/table confirmed</option>
            <option value="message">Promoter/message trail only</option>
            <option value="none">No pre-commit</option>
          </select>
        </div>
        <div>
          <label for="backup">Fallback Plan</label>
          <select id="backup">
            <option value="strong">Backup venue selected nearby</option>
            <option value="weak">Rough backup idea</option>
            <option value="none">No backup</option>
          </select>
        </div>
      </div>

      <div class="actions" style="margin-top:1rem;">
        <button id="runBtn" class="btn btn-primary">Simulate Door Odds</button>
        <button id="resetBtn" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <section id="result" class="card" hidden aria-live="polite"></section>
  </main>

  <script src="../js/main.js"></script>
  <script>
    const scoring = {
      arrival: {early: 20, peak: 8, late: 14},
      group: {small: 16, mid: 10, large: 3},
      dress: {strong: 18, mixed: 9, weak: 1},
      energy: {calm: 16, average: 10, chaotic: 2},
      booking: {host: 20, message: 11, none: 4},
      backup: {strong: 10, weak: 6, none: 1}
    };

    const fixes = {
      arrival: {
        peak: 'Shift arrival 30–60 min earlier or later to avoid worst congestion.',
        late: 'Use late-arrival only with strong composure and clear fallback.'
      },
      group: {
        large: 'Split into staggered arrivals or reduce visible door complexity.',
        mid: 'Designate one spokesperson and keep the group tight.'
      },
      dress: {
        mixed: 'Align footwear/outerwear quality before you arrive.',
        weak: 'Recalibrate dress fit for venue profile before attempting entry.'
      },
      energy: {
        average: 'Lower visible friction: calmer check-in behavior improves outcomes.',
        chaotic: 'Reset group composure before line approach.'
      },
      booking: {
        message: 'Confirm details before arrival; screenshots help reduce ambiguity.',
        none: 'Treat this as a probability play and pre-select fallback.'
      },
      backup: {
        weak: 'Choose one exact fallback within 10–15 minutes.',
        none: 'Always lock at least one fallback before first attempt.'
      }
    };

    function readValues(){
      return {
        arrival: document.getElementById('arrival').value,
        group: document.getElementById('group').value,
        dress: document.getElementById('dress').value,
        energy: document.getElementById('energy').value,
        booking: document.getElementById('booking').value,
        backup: document.getElementById('backup').value,
      };
    }

    function simulate(){
      const v = readValues();
      let total = 0;
      for (const k of Object.keys(v)) total += scoring[k][v[k]];

      // max 100 exactly from weights; clamp anyway
      const pct = Math.max(0, Math.min(100, total));

      let verdict = 'High Risk';
      let color = '#d9534f';
      if (pct >= 70) { verdict = 'Strong Entry Odds'; color = '#5cb85c'; }
      else if (pct >= 50) { verdict = 'Moderate Odds'; color = '#f0ad4e'; }

      const improvement = [];
      Object.keys(v).forEach(k=>{
        if (fixes[k] && fixes[k][v[k]]) improvement.push(fixes[k][v[k]]);
      });

      const topFixes = improvement.slice(0,3);

      const resultEl = document.getElementById('result');
      resultEl.hidden = false;
      resultEl.innerHTML = `
        <h2>Door Simulation Result</h2>
        <p><span class="pill" style="border-color:${color};color:${color}">${verdict}</span><span class="pill">Estimated Entry Probability: ${pct}%</span></p>
        <div class="meter"><div class="fill" style="width:${pct}%"></div></div>
        <p class="muted">This score models practical nightlife variables, not guarantees.</p>
        <h3>Fastest improvements</h3>
        <ul>${topFixes.length ? topFixes.map(x=>`<li>${x}</li>`).join('') : '<li>Your setup is already optimized. Keep fallback discipline.</li>'}</ul>
        <h3>Next move</h3>
        <ul>
          <li><a href="/guides/vip-club-access-nyc.html">Apply VIP/door strategy guide</a></li>
          <li><a href="/tools/venue-compare-nyc.html">Pick best fallback venue</a></li>
          <li><a href="/tools/nyc-night-planner.html">Lock full route in Night Planner</a></li>
        </ul>
      `;
      resultEl.scrollIntoView({behavior:'smooth', block:'start'});
    }

    function resetAll(){
      ['arrival','group','dress','energy','booking','backup'].forEach((id)=>{
        const el=document.getElementById(id);
        el.selectedIndex = 0;
      });
      const resultEl = document.getElementById('result');
      resultEl.hidden = true;
      resultEl.innerHTML = '';
      window.scrollTo({top:0,behavior:'smooth'});
    }

    document.getElementById('runBtn').addEventListener('click', simulate);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  </script>
